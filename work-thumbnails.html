<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suruchi — Thumbnails</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ══ NAVIGATION ══ -->
    <nav>
        <a href="index.html" class="nav-logo"><span>Suruchi</span></a>
        <ul class="nav-links">
            <li><a href="index.html#work">Work</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <section class="section" style="padding-top: 12rem; min-height: 80vh;">
        <div class="section-header">
            <div>
                <p class="section-label reveal">Portfolio</p>
                <h2 class="section-title reveal reveal-delay-1">Click-worthy <em>Covers</em></h2>
            </div>
            <a href="index.html#work" class="btn btn-outline" style="margin-bottom: 2rem;">Back to Work</a>
        </div>

        <div class="reveal reveal-delay-2"
            style="border: 1px dashed var(--border); padding: 5rem 2rem; text-align: center; border-radius: 8px;">
            <p style="color: var(--cream-dim); font-size: 1.2rem; font-family: var(--ff-display); font-style: italic;">
                "High-converting thumbnail designs and cover art will be displayed here."
            </p>
        </div>
    </section>

    <!-- ══ FOOTER ══ -->
    <footer>
        <span class="footer-logo">Suruchi</span>
        <span class="footer-copy">© 2025 — All rights reserved</span>
        <div class="footer-social">
            <a href="https://www.instagram.com/editbysuruchi?igsh=MWU5bHQxMHg3cW80MA==" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">Behance</a>
        </div>
    </footer>

    <!-- ══ SCRIPTS ══ -->
    <script>
        // Scroll reveal
        const reveals = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.12 });
        reveals.forEach(el => observer.observe(el));

        // Nav shrink on scroll
        const nav = document.querySelector('nav');
        window.addEventListener('scroll', () => {
            nav.style.padding = window.scrollY > 60 ? '1rem 4rem' : '1.6rem 4rem';
        });
    </script>
</body>

</html>
